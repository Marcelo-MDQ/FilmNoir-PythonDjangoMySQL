{% extends "base.html" %}

{% block titulo %} Actores {% endblock %}

{% block contenido %} 

<div class="card">
    <div class="card-body">
        <h4 class="card-title">Actores</h4>

        <div class="row justify-content-md-center">
            {% for actor_img in actores_imgs %}
                <div class="col-md-auto">
                    <a href="{% url 'buscar_actor' actor_img.nombreactor %}">
                    {% load static %}
                    <img class="avataractor_chico" src="{% static actor_img.imagenactor %}" >
                    </a>
                </div>
            {% endfor %}        
        </div>
        <br><br>

        <div class="row justify-content-md-center">
                    {% for actor in actores %}
                        <div class="col-md-auto"><a href="{% url 'buscar_actor' actor %}">{{ actor }}</a>
                        </div>
                    {% endfor %}
        </div>
        
    </div>

</div> 

{% endblock %}
