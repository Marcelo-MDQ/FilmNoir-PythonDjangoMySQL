{% extends "base.html" %}

{% block titulo %} Películas {% endblock %}

{% block contenido %} 

<div class="card">
    <div class="card-body">
        <h4 class="card-title">Películas disponibles</h4>
        <a class="btn btn-success" href="{% url 'peliculascajitas' %}" role="button">VER CAJITAS</a>
        </br>

        <div class="row justify-content-md-center">

                    {% for pelicula in peliculas %}
                    
                    <div class="col-md-auto"><a href="{% url 'resenia_Pelicula' pelicula.id %}">{{ pelicula.nombre }}</a>
                    </div>
                    {% endfor %}

        </div>
        
    </div>

</div> 

{% endblock %}
